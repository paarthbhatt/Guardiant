id: over_permissive_defaults
name: "Over-Permissive Defaults"
description: >
  Vibe-coded apps often have CORS=*, debug=true in production, or other
  insecure defaults copied from development templates.
enabled: true
confidence: 0.85
file_patterns:
  - "**/*.{ts,tsx,js,jsx}"
  - "**/config/*"
exclude_patterns:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/node_modules/**"
  - "**/__tests__/**"
  - "**/*.example"
  - "**/*.sample"
code_patterns:
  - pattern: "(?:cors\\s*(?::\\s*|\\s*=\\s*|\\(|\\{)\\s*(?:{[^}]*origin\\s*:\\s*['\"`]\\*['\"`]|['\"`]\\*['\"`]))"
    description: "CORS wildcard"
    weight: 1.0
    is_vulnerability: true
  - pattern: "(?:DEBUG\\s*=\\s*(?:true|1|['\"`]true['\"`])|NODE_ENV\\s*=\\s*['\"`]development['\"`])"
    description: "Debug mode enabled"
    weight: 0.9
    is_vulnerability: true
  - pattern: "(?:allowMethods\\s*:\\s*\\[?\\s*['\"`]\\*['\"`])"
    description: "All methods allowed"
    weight: 0.85
    is_vulnerability: true
  - pattern: "(?:exposedHeaders\\s*:\\s*\\[?\\s*['\"`]\\*['\"`]|accessControlAllowOrigin\\s*:\\s*['\"`]\\*['\"`])"
    description: "Wildcard headers"
    weight: 0.8
    is_vulnerability: true
negative_suppressors:
  - "process.env.NODE_ENV"
  - "app.get('env')"
  - "isProduction"
  - "isDev"
predicted_vulnerabilities:
  - type: cors_misconfiguration
    probability: 0.95
    owasp: A05_SECURITY_MISCONFIGURATION
    reason: "CORS wildcard allows any origin"
  - type: security_misconfiguration
    probability: 0.85
    owasp: A05_SECURITY_MISCONFIGURATION
    reason: "Debug mode may expose sensitive info"
