id: secret_generic
name: "Generic Secrets"
description: >
  Detects hardcoded passwords, private keys, database URLs, and BaaS
  service keys in source code.
enabled: true
file_patterns:
  - "**/*.{ts,tsx,js,jsx,env,env.*,json,yaml,yml,toml}"
exclude_patterns:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/node_modules/**"
  - "**/__tests__/**"
  - "**/mock*"
  - "**/*.example"
patterns:
  - pattern: "(?:password|passwd|pwd)\\s*[:=]\\s*['\"`]([^'\"`]{8,})['\"`]"
    name: "Hardcoded Password"
    severity: critical
    confidence: 0.85
  - pattern: "(?:secret|api[_-]?key|token)\\s*[:=]\\s*['\"`]([^'\"`]{16,})['\"`]"
    name: "Hardcoded Secret"
    severity: critical
    confidence: 0.85
  - pattern: "(?:private[_-]?key|secret[_-]?key)\\s*[:=]\\s*['\"`]([^'\"`]+)['\"`]"
    name: "Private Key Reference"
    severity: critical
    confidence: 0.85
  - pattern: "(?:postgres|mysql|mongodb|redis)://[^@]+@[^\\s]+"
    name: "Database URL"
    severity: critical
    confidence: 0.9
  - pattern: "supabase_service_role_key\\s*[:=]\\s*['\"`]([^'\"`]+)['\"`]"
    name: "Supabase Service Key"
    severity: critical
    confidence: 0.95
  - pattern: "private_key\\s*=\\s*['\"`]-----BEGIN PRIVATE KEY-----"
    name: "Private Key in Code"
    severity: critical
    confidence: 0.95
negative_suppressors:
  - "example"
  - "placeholder"
  - "your-"
  - "xxx"
  - "test"
  - "dummy"
  - "fake"
  - "sample"
  - "REPLACE_ME"
  - "<your"
  - "INSERT_"
  - "changeme"
  - "CHANGEME"
