id: secret_api_keys
name: "Exposed API Keys"
description: >
  Detects hardcoded API keys for cloud services, AI providers, and
  developer platforms.
enabled: true
file_patterns:
  - "**/*.{ts,tsx,js,jsx,env,env.*,json,yaml,yml,toml}"
exclude_patterns:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/node_modules/**"
  - "**/__tests__/**"
  - "**/mock*"
  - "**/*.example"
patterns:
  - pattern: "sk-[a-zA-Z0-9]{20,}"
    name: "OpenAI API Key"
    severity: critical
    confidence: 0.95
  - pattern: "sk-ant-[a-zA-Z0-9-]{20,}"
    name: "Anthropic API Key"
    severity: critical
    confidence: 0.95
  - pattern: "AIza[a-zA-Z0-9_-]{35}"
    name: "Google API Key"
    severity: critical
    confidence: 0.95
  - pattern: "AKIA[A-Z0-9]{16}"
    name: "AWS Access Key"
    severity: critical
    confidence: 0.95
  - pattern: "ghp_[a-zA-Z0-9]{36}"
    name: "GitHub PAT"
    severity: critical
    confidence: 0.95
  - pattern: "github_pat_[a-zA-Z0-9_]{22,}"
    name: "GitHub Fine-grained PAT"
    severity: critical
    confidence: 0.95
  - pattern: "xox[baprs]-[a-zA-Z0-9-]{10,}"
    name: "Slack Token"
    severity: high
    confidence: 0.9
  - pattern: "(?:client[_-]?secret|oauth[_-]?secret)\\s*[:=]\\s*['\"`]([^'"`]+)['\"`]"
    name: "OAuth Client Secret"
    severity: critical
    confidence: 0.9
negative_suppressors:
  - "example"
  - "placeholder"
  - "your-"
  - "xxx"
  - "test"
  - "dummy"
  - "fake"
  - "sample"
  - "REPLACE_ME"
  - "<your"
  - "INSERT_"
