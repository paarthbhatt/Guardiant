id: secret_jwt
name: "JWT Token Exposure"
description: >
  Detects JWT tokens exposed in source code. Short-lived tokens (< 1 hour)
  in test files are suppressed to reduce false positives.
enabled: true
file_patterns:
  - "**/*.{ts,tsx,js,jsx,env,env.*,json,yaml,yml}"
exclude_patterns:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/node_modules/**"
  - "**/__tests__/**"
  - "**/mock*"
patterns:
  - pattern: "eyJ[a-zA-Z0-9_-]*\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*"
    name: "JWT Token"
    severity: high
    confidence: 0.8
    # Tokens with exp < 1 hour from now should be downgraded
    # Tokens in test files should be downgraded to medium
negative_suppressors:
  - "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOj"  # Common test fixture
  - "mock"
  - "fake"
  - "test"
  - "example"
  - "fixture"
