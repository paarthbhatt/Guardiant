name: Feature Request
description: Suggest a new feature for Guardiant
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We value your input.
  
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when... / It would be helpful if...
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: I'd like Guardiant to...
    validations:
      required: true
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions did you think about?
      placeholder: I also considered...
  
  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - New Security Agent
        - Analysis Framework Enhancement
        - CLI/UX Improvement
        - Reporting Feature
        - Integration (CI/CD, IDE, etc.)
        - Performance Optimization
        - Documentation
        - Other
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this to you?
      options:
        - Critical (blocking my work)
        - High (very important)
        - Medium (nice to have)
        - Low (future enhancement)
    validations:
      required: true
  
  - type: textarea
    id: examples
    attributes:
      label: Examples or Use Cases
      description: Provide specific examples of how you'd use this
      placeholder: "Example: When scanning a Supabase app, I want to..."
  
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I would be willing to contribute this feature
        - label: I would be willing to help test this feature
